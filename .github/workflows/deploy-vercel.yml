name: Deploy a Vercel (producción)

# Despliega automáticamente a producción en Vercel en cada push a main.
on:
  push:
    branches: [main]
  # Permite ejecutarlo manualmente desde la pestaña Actions.
  workflow_dispatch:

# Evita despliegues en paralelo: cancela el anterior si llega un push nuevo.
concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar Vercel CLI
        run: npm install --global vercel@latest

      - name: Vincular proyecto y traer variables de entorno
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build de producción
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy a producción
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
